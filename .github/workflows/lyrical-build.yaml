name: ROS Lyrical Build

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * SUN'  # 00:00 on Sunday.

permissions:
      packages: write
      contents: read

jobs:
  build-and-deploy-lyrical:
    uses: ./.github/workflows/build-one-ros-distro.yaml
    with:
      ros_distro: lyrical
      image_name: ros
